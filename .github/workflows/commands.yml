name: Comment Commands

on: issue_comment

permissions:
  contents: read

jobs:
  # See also backport.yml, which is the variant that triggers on PR merge rather
  # than on comment.
  backport:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-24.04
    if: github.event.issue.pull_request && startsWith(github.event.comment.body, '/backport')
    steps:
    - name: Extract Command
      id: command
      uses: xt0rted/slash-command-action@bf51f8f5f4ea3d58abc7eca58f77104182b23e88 # v2
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        command: backport
        reaction: "true"
        reaction-type: "eyes"
        allow-edits: "false"
        permission-level: write

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0

    - name: Open Backport PR
      uses: korthout/backport-action@ad30f01dbe543be4a24431001c38f3617af8c745 # v4.4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        github_workspace: ${{ github.workspace }}
