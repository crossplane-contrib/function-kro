# Observed state for `crossplane render --observed-resources`. Supplying a
# provider-assigned ID and Ready condition for each resource lets render resolve
# the ${vpc.status.atProvider.id} dependencies and populate the XR status.
#
# xr.yaml sets enablePublicSubnet: false, so the public subnet is excluded by
# includeWhen and has no observed entry here. Resources match composition nodes
# by the crossplane.io/composition-resource-name annotation.
---
apiVersion: ec2.aws.m.upbound.io/v1beta1
kind: VPC
metadata:
  name: cool-network-vpc
  annotations:
    crossplane.io/composition-resource-name: vpc
  labels:
    crossplane.io/composite: cool-network
status:
  atProvider:
    id: vpc-0a1b2c3d4e5f67890
  conditions:
  - type: Ready
    status: "True"
    reason: Available
---
apiVersion: ec2.aws.m.upbound.io/v1beta1
kind: Subnet
metadata:
  name: cool-network-subnet
  annotations:
    crossplane.io/composition-resource-name: subnet
  labels:
    crossplane.io/composite: cool-network
status:
  atProvider:
    id: subnet-0aaaaaaaaaaaaaaaa
  conditions:
  - type: Ready
    status: "True"
    reason: Available
---
apiVersion: ec2.aws.m.upbound.io/v1beta1
kind: SecurityGroup
metadata:
  name: cool-network-sg
  annotations:
    crossplane.io/composition-resource-name: securityGroup
  labels:
    crossplane.io/composite: cool-network
status:
  atProvider:
    id: sg-0dddddddddddddddd
  conditions:
  - type: Ready
    status: "True"
    reason: Available
